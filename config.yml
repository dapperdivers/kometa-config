libraries: # This is called out once within the config.yml file
  Movies:
    schedule_overlays: weekly(sunday) # run the overlay pass weekly; existing overlays stay put on other days
    settings: &kometa_settings
      asset_directory: /assets/Movies
      prioritize_assets: true
      minimum_items: 5
    template_variables:
      sep_style: gray # use the gray separators globally for this library
      collection_mode: hide # hide the collections
      language: en # could be default(which is en), da, de, fr, pt-br or another lang code that we have translated
      placeholder_imdb_id: tt8579674 # 1917 (2019) placeholder id for the separators
    collection_files: # Movie Subgenre Collections - Split into categories for better organization
      - file: /config/custom/movie_subgenre/action_adventure.yml # Monday schedule
      - file: /config/custom/movie_subgenre/comedy_satire.yml # Tuesday schedule
      - file: /config/custom/movie_subgenre/crime_thriller.yml # Tuesday schedule
      - file: /config/custom/movie_subgenre/fantasy_supernatural.yml # Wednesday schedule
      - file: /config/custom/movie_subgenre/horror_occult.yml # Wednesday schedule
      - file: /config/custom/movie_subgenre/sci_fi_futuristic.yml # Thursday schedule
      - file: /config/custom/movie_subgenre/historical_period.yml # Thursday schedule
      - file: /config/custom/movie_subgenre/romance_drama.yml # Friday schedule
      - file: /config/custom/movie_subgenre/exploitation_niche.yml # Friday schedule
      - file: /config/custom/movie_subgenre/experimental_artistic.yml # Saturday schedule
      - default: based # collections based on a book, comic, story, video game
        schedule: weekly(monday)
      - default: separator_award # An "index card"
      - default: pca # People's Choice Awards
        schedule: &win_pca range(11/01-12/31) # PCA season
        template_variables:
          visible_home: *win_pca
          visible_shared: *win_pca
      - default: sag # Screen Actors Guild Awards
        schedule: &win_sag range(01/15-02/15) # SAG season
        template_variables:
          visible_home: *win_sag
          visible_shared: *win_sag
      - default: tiff # Toronto International Film Festival Awards
        schedule: &win_tiff range(09/01-10/15) # TIFF season
        template_variables:
          visible_home: *win_tiff
          visible_shared: *win_tiff
      - default: bafta # BAFTA Awards
        schedule: &win_bafta range(01/01-02/28) # BAFTA season
        template_variables:
          visible_home: *win_bafta
          visible_shared: *win_bafta
      - default: cannes # Cannes Film Festival Awards
        schedule: &win_cannes range(05/01-06/15) # Cannes season
        template_variables:
          visible_home: *win_cannes
          visible_shared: *win_cannes
      - default: choice # Critic's Choice Awards
        schedule: &win_choice range(01/01-02/15) # Critics Choice season
        template_variables:
          visible_home: *win_choice
          visible_shared: *win_choice
      - default: emmy # Emmy Awards
        schedule: &win_emmy range(08/01-10/15) # Emmy season
        template_variables:
          visible_home: *win_emmy
          visible_shared: *win_emmy
      - default: golden # Golden Globes Awards
        schedule: &win_golden range(12/01-01/31) # Golden Globes season
        template_variables:
          visible_home: *win_golden
          visible_shared: *win_golden
      - default: oscars # The Oscars
        schedule: &win_oscars range(02/01-04/15) # Oscar season
        template_variables:
          visible_home: *win_oscars
          visible_shared: *win_oscars
          hub_priority: 3 # float Oscars near the top of the home row during its window (lower = higher)
      - default: spirit # Independent Spirit Awards
        schedule: &win_spirit range(02/15-03/31) # Spirit Awards season
        template_variables:
          visible_home: *win_spirit
          visible_shared: *win_spirit
      - default: sundance # Sundance Film Festival Awards
        schedule: &win_sundance range(01/15-02/15) # Sundance season
        template_variables:
          visible_home: *win_sundance
          visible_shared: *win_sundance
          hub_priority: 5 # surface during Sundance season, just below Oscars
      - default: separator_chart # An "index card"
      - default: imdb # IMDb Charts (Popular, Trending, etc.)
        schedule: weekly(saturday|sunday|monday|tuesday|wednesday)
        template_variables: &daily_visibility
          visible_home: daily
          visible_shared: daily
      - default: other_chart # Other Charts (Popular, Trending, etc.)
        schedule: daily # Pirated content updates daily
        template_variables:
          <<: *daily_visibility
          use_pirated: true
          visible_home_pirated: true
          visible_shared_pirated: true
      - default: tautulli # Tautulli Charts (Popular, Trending, etc.)
        schedule: weekly(monday|tuesday|wednesday|thursday|friday)
        template_variables: *daily_visibility
      - default: tmdb # TMDb Charts (Popular, Trending, etc.)
        schedule: weekly(wednesday|thursday|friday|saturday|sunday)
        template_variables: *daily_visibility
      - default: basic # Some basic chart collections based on recently released media in your library
        schedule: weekly(sunday)
      - default: collectionless # Collectionless collection to help Show/Hide Movies/Shows properly in your library
        schedule: weekly(sunday)
      - default: actor
        template_variables: &birthday_actor
          collection_section: "001"
          use_separator: false
          style: diiivoycolor
          name_format: 🎂 <<key_name>>'s Birthday
          translation_key: birthday
          sort_by: audience_rating.desc
          title_format: <<key_name>>'s Birthday
          data:
            depth: 20
            limit: 100
          tmdb_birthday:
            this_month: true
      - default: actor # Actors
        schedule: &win_actor_rot range(01/01-01/31),range(05/01-05/31),range(09/01-09/30) # Months 1,5,9
        template_variables: # bw, rainier, diiivoy, diiivoycolor, or orig style is used.
          style: signature
          visible_home: *win_actor_rot
          visible_shared: *win_actor_rot
          data: &sig_data
            depth: 1
            limit: 15
      - default: director # Directors
        schedule: &win_director_rot range(02/01-02/28),range(06/01-06/30),range(10/01-10/31) # Months 2,6,10
        template_variables: # bw, rainier, diiivoy, diiivoycolor, or orig style is used.
          style: signature
          visible_home: *win_director_rot
          visible_shared: *win_director_rot
          data: *sig_data
      - default: producer # Producers
        schedule: &win_producer_rot range(03/01-03/31),range(07/01-07/31),range(11/01-11/30) # Months 3,7,11
        template_variables: # bw, rainier, diiivoy, diiivoycolor, or orig style is used.
          style: signature
          visible_home: *win_producer_rot
          visible_shared: *win_producer_rot
          data: *sig_data
      - default: writer # Writers
        schedule: &win_writer_rot range(04/01-04/30),range(08/01-08/31),range(12/01-12/31) # Months 4,8,12
        template_variables: # bw, rainier, diiivoy, diiivoycolor, or orig style is used.
          style: signature
          visible_home: *win_writer_rot
          visible_shared: *win_writer_rot
          data: *sig_data
      - default: genre # Action, Comedy, Drama, etc.
        schedule: weekly(monday|tuesday|wednesday)
      - default: studio # DreamWorks Studios, Lucasfilm Ltd, etc.
        schedule: weekly(tuesday|wednesday|thursday)
      - default: decade # Decade the media item was released
        schedule: weekly(wednesday|thursday|friday)
      - git: bullmoose20/separator_franchise # Separator for franchise
        template_variables:
          collection_section: "035" # Set to "035" to be right before universe. Should be the same here and below
      - default: franchise # https://kometa.wiki/en/latest/defaults/movie/franchise
        schedule: weekly(friday)
        template_variables:
          collection_section: "035" # Set to "035" to be right before universe. Should be the same here and above
      - default: seasonal # Christmas, Halloween, etc.
        template_variables:
          schedule_years: daily # Keep as daily unless specific year-end/new-year range is desired
          schedule_valentine: range(02/01-02/14) # First half of February
          schedule_patrick: range(03/01-03/17) # First half of March up to St. Patrick's Day
          schedule_easter: range(03/15-04/15) # Covers typical Easter timeframe (late March - mid April)
          schedule_mother: range(05/01-05/15) # First half of May for Mother's Day
          schedule_memorial: range(05/15-05/31) # Second half of May for Memorial Day
          schedule_father: range(06/01-06/21) # First three weeks of June for Father's Day
          schedule_independence: range(07/01-07/07) # Week of July 4th
          schedule_labor: range(09/01-09/10) # Early September for Labor Day
          schedule_halloween: range(10/15-10/31) # Second half of October for Halloween
          schedule_veteran: range(11/01-11/11) # Early November up to Veteran's Day
          schedule_thanksgiving: range(11/15-11/30) # Second half of November for Thanksgiving (US)
          schedule_christmas: range(12/01-12/25) # December leading up to Christmas
          schedule_aapi: range(05/01-05/31) # AAPI Heritage Month (May)
          schedule_disabilities: range(07/01-07/31) # Disability Pride Month (July)
          schedule_black_history: range(02/01-02/28) # Black History Month (February)
          schedule_lgbtq: range(06/01-06/30) # LGBTQ+ Pride Month (June)
          schedule_latinx: range(09/15-10/15) # Latinx Heritage Month (Mid-Sep to Mid-Oct)
          schedule_women: range(03/01-03/31) # Women's History Month (March)
      - default: streaming # Streaming on Disney+, Netflix, etc.
        schedule: weekly(saturday)
      - default: universe # Marvel Cinematic Universe, Wizarding World, etc.
        schedule: weekly(saturday)
    overlay_files:
      - file: /config/overlays/media_info.yml
        template_variables:
          use_edition: false
          use_gradient_top: true
          use_gradient_bottom: false
      - file: /config/overlays/audience_rating.yml
      - default: mediastinger
        template_variables:
          horizontal_align: left
          horizontal_offset: 50
          vertical_offset: 190
      - default: runtimes
        template_variables:
          horizontal_offset: 70
          text: ""
          vertical_offset: 100
          vertical_align: top
          horizontal_align: left
          back_align: center
          back_width: 140
          back_color: "#00000000"
      - remove_overlays: false
    operations:
      - &id001
        split_duplicates: false # Splits all duplicate movies/shows found in this library
        assets_for_all: false # Disabled - was causing daily database load
        delete_collections:
          configured: false # False - Collection must be an Unconfigured Collection to be deleted (collection is not in the config file of the specific Kometa run).
          managed: false # False - Collection must be an Unmanaged Collection to be deleted (the collection does not have the Kometa label)
          less: 99999 # Effectively all collections regardless of the number of items in the collection
      - &id002
        schedule: monthly(1)
        mass_user_rating_update: mdb_tomatoes
      - &id003
        schedule: monthly(8)
        mass_critic_rating_update: imdb
      - &id004
        schedule: monthly(15)
        mass_audience_rating_update: tmdb
      - &id005
        schedule: yearly(01/01)
        mass_genre_update:
          - tmdb # Update all genres from tmdb
          - imdb # Update all genres from imdb if not from tmdb
          - tvdb # Update all genres from tvdb if not from imdb
      - &id006
        schedule: monthly(22)
        mass_content_rating_update:
          - plex_csm # Common Sense age rating from Plex's own cache — no API key
          - mdb_commonsense # fallback via MDbList if Plex hasn't cached it
          - omdb # final fallback if not found on plex_csm/mdb_commonsense
      - &id007
        schedule: yearly(01/01)
        mass_studio_update:
          - tmdb
          - tvdb
          - omdb # Update all studios from tmdb
      - &id008
        schedule: yearly(04/01)
        mass_originally_available_update:
          - tmdb # Update all original available date from tmdb
          - tvdb # Update all original available date from tvdb if not from tmdb
          - omdb # Update all original available date from omdb(imdb) if not from tvdb
    radarr:
      url: <<RADARR_HOST>>
      token: <<RADARR_API_KEY>>
      add_missing: false
      add_existing: true
      root_folder_path: <<RADARR_ROOT_FOLDER_PATH>>
      monitor: true
      monitor_existing: true
      ignore_cache: false
      availability: announced
      quality_profile: HD Bluray + WEB
  TV Shows:
    schedule_overlays: weekly(sunday) # episode overlay pass is expensive (~5h); run 1x/week to stay well under the job deadline, overlays persist otherwise
    settings:
      <<: *kometa_settings
      asset_directory: /assets/TV Shows
    template_variables:
      sep_style: gray # use the gray separators globally for this library
      collection_mode: hide # hide the collections
      language: en # could be default(which is en), da, de, fr, pt-br or another lang code that we have translated
      placeholder_imdb_id: tt1190634 # The Boys (2019) placeholder id for the separators
    collection_files: # These files contain collections: and/or dynamic_collections attributes
      - default: based # collections based on a book, comic, story, video game
        schedule: weekly(monday)
      - default: aspect # Creates collections based on aspect ratio of media item
        schedule: weekly(tuesday)
      - git: bullmoose20/tv_refresh # Tells plex to refresh media items added within the last 7 days
      - default: separator_award # An "index card"
      - default: pca # People's Choice Awards
        schedule: *win_pca # PCA season
        template_variables:
          visible_home: *win_pca
          visible_shared: *win_pca
      - default: choice # Critic's Choice Awards
        schedule: *win_choice # Critics Choice season
        template_variables:
          visible_home: *win_choice
          visible_shared: *win_choice
      - default: golden # Golden Globes Awards
        schedule: *win_golden # Golden Globes season
        template_variables:
          visible_home: *win_golden
          visible_shared: *win_golden
      - default: emmy # Emmy Awards
        schedule: *win_emmy # Emmy season
        template_variables:
          visible_home: *win_emmy
          visible_shared: *win_emmy
          hub_priority: 3 # float Emmys to the top of the TV home row during Emmy season
      - default: separator_chart # An "index card"
      - default: anilist # AniDB Charts (Popular, Trending, etc.)
        schedule: weekly(saturday|sunday|monday|tuesday|wednesday)
        template_variables: *daily_visibility
      - default: imdb # IMDb Charts (Popular, Trending, etc.)
        schedule: weekly(saturday|sunday|monday|tuesday|wednesday)
        template_variables: *daily_visibility
      - default: myanimelist # MAL Charts (Popular, Trending, etc.)
        schedule: weekly(monday|tuesday|wednesday|thursday|friday)
        template_variables: *daily_visibility
      - default: other_chart # Other Charts (Popular, Trending, etc.)
        schedule: daily
        template_variables: *daily_visibility
      - default: tautulli # Tautulli Charts (Popular, Trending, etc.)
        schedule: weekly(monday|tuesday|wednesday|thursday|friday)
        template_variables: *daily_visibility
      - default: tmdb # TMDb Charts (Popular, Trending, etc.)
        schedule: weekly(wednesday|thursday|friday|saturday|sunday)
        template_variables: *daily_visibility
      - default: trakt # Trakt Charts (Popular, Trending, etc.)
        schedule: weekly(thursday|friday|saturday|sunday|monday)
        template_variables: *daily_visibility
      - default: basic # Some basic chart collections based on recently released media in your library
        schedule: weekly(sunday)
      - default: collectionless # Collectionless collection to help Show/Hide Movies/Shows properly in your library
        schedule: weekly(sunday)
      - default: actor
        template_variables: *birthday_actor
      - default: actor # Actors
        schedule: weekly(monday)
        template_variables: # bw, rainier, diiivoy, diiivoycolor, or orig style is used.
          style: signature
          data: *sig_data
      - default: genre # Action, Comedy, Drama, etc.
        schedule: weekly(monday|tuesday|wednesday)
      - default: studio # DreamWorks Studios, Lucasfilm Ltd, etc.
        schedule: weekly(tuesday|wednesday|thursday)
      - default: decade # Decade the media item was released
        schedule: weekly(wednesday|thursday|friday)
      - git: bullmoose20/separator_franchise # Separator for franchise
        template_variables:
          collection_section: "035" # Set to "035" to be right before universe. Should be the same here and below
      - default: franchise # https://kometa.wiki/en/latest/defaults/movie/franchise
        schedule: weekly(friday)
        template_variables:
          collection_section: "035" # Set to "035" to be right before universe. Should be the same here and above
      - default: network # ABC, CBC, NBC, FOX, etc.
        schedule: weekly(friday)
      - default: streaming # Streaming on Disney+, Netflix, etc.
        schedule: weekly(saturday)
      - default: universe # Marvel Cinematic Universe, Wizarding World, etc.
        schedule: weekly(saturday)
    overlay_files:
      - file: /config/overlays/media_info.yml
        template_variables:
          use_combined: false
          use_audio: false
          use_gradient_top: false
          use_gradient_bottom: false
      - file: /config/overlays/audience_rating.yml
      - default: status
        template_variables:
          horizontal_align: center
          vertical_align: bottom
          vertical_offset: 23
          horizontal_offset: 0
          back_height: 149
          back_width: 965
          font: /config/overlays/fonts/Colus-Regular.ttf
          font_size: 80
          font_color_airing: "#27C24C"
          font_color_returning: "#FFA500"
          font_color_canceled: "#ED1F1F"
          font_color_ended: "#FF0000"
          back_color: "#00000000"
      # Season Overlay
      - file: /config/overlays/media_info.yml
        template_variables:
          builder_level: season
          use_combined: false
          use_video: false
          use_audio: false
          use_gradient_top: false
          use_gradient_bottom: false
      - file: /config/overlays/audience_rating.yml
        template_variables:
          builder_level: season
      # Episode Overlay
      - file: /config/overlays/media_info.yml
        template_variables:
          builder_level: episode
          use_edition: false
          use_gradient_top: true
          use_gradient_bottom: true
      - file: /config/overlays/audience_rating.yml
        template_variables:
          builder_level: episode
      - default: runtimes
        template_variables:
          builder_level: episode
          horizontal_offset: 225
          text: ""
          vertical_offset: 40
          vertical_align: top
          horizontal_align: left
          back_align: center
          back_width: 140
          back_color: "#00000000"
      - remove_overlays: false
    operations:
      <<: [*id001, *id002, *id003, *id004, *id005, *id006, *id007, *id008]
    sonarr:
      url: <<SONARR_HOST>>
      token: <<SONARR_API_KEY>>
      add_missing: false
      add_existing: true
      root_folder_path: <<SONARR_ROOT_FOLDER_PATH>>
      monitor: all
      quality_profile: WEB-1080p
      language_profile: English
      series_type: standard
      season_folder: true

settings:
  cache: true
  cache_expiration: 60
  asset_directory: /assets
  asset_folders: true
  create_asset_folders: false # posterizarr manages posters; skip folder-creation I/O on CephFS
  asset_depth: 0
  prioritize_assets: false
  dimensional_asset_rename: false
  download_url_assets: false # posterizarr already downloads posters; avoids redundant asset work
  show_missing_season_assets: false
  show_missing_episode_assets: false
  show_asset_not_needed: true
  sync_mode: append
  minimum_items: 5
  auto_sort_hubs: configured # sort home-screen hub rows by config order; affects collections promoted via visible_home/_shared (Plex Pass)
  default_collection_order:
  delete_below_minimum: true
  delete_not_scheduled: false
  run_again_delay: 10
  missing_only_released: false
  missing_path: /config/missing
  show_unmanaged: true
  show_filtered: false
  show_options: false
  show_missing: false
  show_missing_assets: false # reduce log churn
  only_filter_missing: false
  save_report: true
  tvdb_language: eng
  ignore_ids:
  ignore_imdb_ids:
  item_refresh_delay: 0 # was 1: removed per-item sleep across thousands of items
  playlist_sync_to_users: all
  playlist_exclude_users:
  run_order:
    - operations
    - metadata
    - collections
    - overlays
  overlay_artwork_quality: 85
  overlay_artwork_filetype: jpg
  playlist_report: false
  verify_ssl: true
  check_nightly: false
  show_unconfigured: true
  show_unfiltered: false
  ignore_empty_smart_collections: true
  custom_repo:
plex:
  url: <<PLEX_HOST>>
  token: <<PLEX_API_KEY>>
  timeout: 360
  db_cache: 4096
  clean_bundles: false
  empty_trash: false
  optimize: false
  verify_ssl: false
tmdb:
  apikey: <<TMDB_API_KEY>>
  language: en
  cache_expiration: 60
  region:
tautulli:
  url: <<TAUTULLI_HOST>>
  apikey: <<TAUTULLI_API_KEY>>
omdb:
  apikey: <<OMDB_API_KEY>>
  cache_expiration: 60
mdblist:
  apikey: <<MDBLIST_API_KEY>>
  cache_expiration: 60
trakt:
  cache_expiration: 60
  force_refresh: false
  client_id: <<TRAKT_CLIENT_ID>>
  client_secret: <<TRAKT_CLIENT_SECRET>>
  pin: # Add your Trakt PIN here after visiting the authorization URL shown in logs
  authorization:
    access_token: <<TRAKT_ACCESS_TOKEN>>
    token_type: Bearer
    expires_in: <<TRAKT_EXPIRES_IN>>
    refresh_token: <<TRAKT_REFRESH_TOKEN>>
    scope: public
    created_at: <<TRAKT_CREATED_AT>>
  # Notification services - commented out to prevent connection errors
  # Uncomment and configure with actual values when ready to use
notifiarr:
  apikey:
gotify:
  url:
  token:
ntfy:
  url: http://ntfy.network.svc.cluster.local:8080 # internal ntfy, no egress
  token: <<NTFY_TOKEN>> # reuses cluster NTFY_TOKEN (carport user, all topics) via kometa-secret
  topic: kometa
webhooks:
  error: ntfy # errors/failures during a run
  run_start: ntfy # daily run begins
  run_end: ntfy # daily run finished (includes added/removed summary)
  # changes: ntfy  # intentionally OFF — fires per metadata change, far too noisy
  # NOTE: a hung run never reaches run_end/error; the cluster KubeJobFailed -> ntfy alert covers that gap.
mal:
  client_id:
  client_secret:
playlist_files:
#  - file: path/to/playlist.yml
