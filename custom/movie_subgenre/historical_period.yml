external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Costume Drama:
    schedule: &sched weekly(wednesday|thursday|friday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(thursday)
        visible_shared: weekly(thursday)
      keyword: "costume-drama"
      letterboxd_list: "theme-costume-drama"

  Epic:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "epic"
      letterboxd_list: "theme-epics"

  Historical Event:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "historical-event"
      letterboxd_list: "theme-historical-event"

  Medieval:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "medieval-times"
      letterboxd_list: "theme-medieval"

  Period Drama:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "period-drama"
      letterboxd_list: "theme-period-drama"

  Prehistoric:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "prehistoric-times"
      letterboxd_list: "theme-prehistoric"
      letterboxd_list_details_url_1: "https://letterboxd.com/mikkelhh/list/before-civilization-prehistoric-films/by/rating/"
      letterboxd_list_details_limit_1: 250
      rating.gte: 2

  Spaghetti Western:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "spaghetti-western"
      letterboxd_list: "theme-spaghetti-western"
      rating.gte: 1
      votes.gte: 10
