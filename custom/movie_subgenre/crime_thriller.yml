external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Betrayal:
    schedule: &sched weekly(monday|tuesday|wednesday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(tuesday)
        visible_shared: weekly(tuesday)
      keyword: "betrayal"
      letterboxd_list: "theme-betrayal"

  Caper:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "caper"
      letterboxd_list: "theme-caper"
      votes.gte: 100

  Con Artist:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "con-artist,con-man"
      letterboxd_list: "theme-con-artists"
      rating.gte: 2

  Cop:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "detective,police-car,police-detective,police-officer,police-station,police"
      letterboxd_list: "theme-cop"
      rating.gte: 2

  Courtroom:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "courtroom,judge,lawyer"
      letterboxd_list: "theme-courtroom"

  Detective:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "detective,police-detective"
      letterboxd_list: "theme-detective"

  Espionage:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "espionage"
      letterboxd_list: "theme-espionage"

  Fugitive:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "fugitive,on-the-run"
      letterboxd_list: "theme-fugitives"

  Gangster:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "gangster"
      letterboxd_list: "theme-gangster"

  Heist:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "heist,robbery"
      letterboxd_list: "theme-heists"

  Hostage:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "hostage-situation"
      letterboxd_list: "theme-hostage"

  Hustle:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "hustler,gambling"
      letterboxd_list: "theme-hustle"

  Outlaw:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "outlaw"
      letterboxd_list: "theme-outlaw"
      rating.gte: 2
      votes.gte: 100

  Prison:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "prison,prisoner,prison-guard"
      letterboxd_list: "theme-prison"
      rating.gte: 2
      votes.gte: 100

  Serial Killer:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "serial-killer,murder"
      letterboxd_list: "theme-serial-killers"

  Whodunit:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "whodunit"
      letterboxd_list: "theme-whodunit"
      rating.gte: 2
      votes.gte: 100
