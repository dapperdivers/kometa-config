external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Bug:
    schedule: &sched weekly(tuesday|wednesday|thursday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(wednesday)
        visible_shared: weekly(wednesday)
      keyword: "giant-insect"
      letterboxd_list: "theme-bugs"
      rating.gte: 2
      votes.gte: 100

  Cannibal:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "cannibalism,cannibal"
      letterboxd_list: "theme-cannibalism"
      rating.gte: 2
      votes.gte: 100

  Demonic:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "demon"
      letterboxd_list: "theme-demonic"

  Found Footage:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "horror"
      keyword: "found-footage"
      letterboxd_list: "theme-found-footage"
      rating.gte: 2

  Ghost:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "horror"
      keyword: "ghost"
      letterboxd_list: "theme-ghosts"

  Gothic:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "horror"
      keyword: "gothic"
      letterboxd_list: "theme-gothic"
      rating.gte: 2
      votes.gte: 100

  Monster:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "horror"
      keyword: "creature,monster,creature-feature"
      letterboxd_list: "theme-monsters"

  Occult:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "occult"
      letterboxd_list: "theme-occult"

  Slasher:
    schedule: *sched
    template:
      <<: *tmpl
      imdb_extra_1: "https://www.imdb.com/list/ls053988992"
      imdb_extra_2: "https://www.imdb.com/list/ls029703473"
      imdb_extra_3: "https://www.imdb.com/list/ls002540370"
      imdb_extra_4: "https://www.imdb.com/list/ls062357250"
      keyword: "slasher"
      letterboxd_list: "theme-slasher"

  Splatter:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "horror"
      keyword: "splatter"
      letterboxd_list: "theme-splatter"
      rating.gte: 2

  Vampire:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "vampire"
      letterboxd_list: "theme-vampires"

  Werewolf:
    schedule: *sched
    template:
      <<: *tmpl
      keyword.any: "werewolf,werewolves"
      letterboxd_list: "theme-werewolves"

  Zombie:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "zombie"
      letterboxd_list: "theme-zombie"
