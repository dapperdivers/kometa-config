external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Absurdism:
    schedule: &sched weekly(friday|saturday|sunday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(saturday)
        visible_shared: weekly(saturday)
      keyword: "absurdism"
      letterboxd_list: "theme-absurdism"

  Conspiracy:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "conspiracy"
      letterboxd_list: "theme-conspiracy"

  Disaster:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "disaster,disaster-film"
      letterboxd_list: "theme-disaster"

  Experimental:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "experimental-film"
      letterboxd_list: "theme-experimental"
      rating.gte: 3

  Medical:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "medical"
      letterboxd_list: "theme-medical"
      rating.gte: 2
      votes.gte: 100

  Mind-Bend:
    schedule: *sched
    template:
      <<: *tmpl
      imdb_extra_1: "https://www.imdb.com/list/ls066069214"
      keyword: "mindbender"
      letterboxd_list: "theme-mindfuck"
      trakt_extra_1: "https://trakt.tv/users/hdlists/lists/mindfuck-movies"

  Paranormal:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "paranormal-phenomenon"
      letterboxd_list: "theme-paranormal"

  Philosophy:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "philosophy"
      letterboxd_list: "theme-philosophical"
      trakt_extra_1: "https://trakt.tv/users/rizreflects/lists/philosophical"

  Politics:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "politics,politician"
      letterboxd_list: "theme-political"

  Psychedelic:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "psychedelic"
      letterboxd_list: "theme-psychedelic"
      rating.gte: 2

  Psychological:
    schedule: *sched
    template:
      <<: *tmpl
      keyword.any: "psychological,psychological-horror"
      letterboxd_list: "theme-psychological"
      rating.gte: 2

  Religion:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "faith,religion,prayer"
      letterboxd_list: "theme-religous"
      rating.gte: 2
      votes.gte: 100

  Remake:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "remake"
      letterboxd_list_details_url_1: "https://letterboxd.com/l_shelby/list/remakes/by/rating/"
      letterboxd_list_details_limit_1: 250
      letterboxd_list: "theme-remake"
      votes.gte: 100

  Revenge:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "revenge-plot"
      letterboxd_list: "theme-revenge"
      rating.gte: 3

  Stop-Motion:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "stop-motion"
      letterboxd_list_details_url_1: "https://letterboxd.com/savage_/list/stop-motion/by/rating/"
      letterboxd_list_details_limit_1: 250
      letterboxd_list: "theme-stop-motion"
      votes.gte: 100

  Surrealism:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "surrealism"
      letterboxd_list: "theme-surrealism"
      rating.gte: 7

  Video Game:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "based-on-video-game"
      letterboxd_list: "theme-video-game"
