external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Alien:
    schedule: &sched weekly(wednesday|thursday|friday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(thursday)
        visible_shared: weekly(thursday)
      keyword: "alien,alien-invasion"
      letterboxd_list: "theme-aliens"

  Alternate History:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "alternate-history"
      letterboxd_list: "theme-alternate-history"

  Apocalypse:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "apocalypse,end-of-the-world"
      letterboxd_list: "theme-apocalypse"

  Artificial Intelligence:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "artificial-intelligence"
      letterboxd_list: "theme-artificial-intelligence"

  Cyberpunk:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "cyberpunk,future"
      letterboxd_list: "theme-cyberpunk"

  Dinosaurs:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "dinosaur"
      letterboxd_list: "theme-dinosaurs"

  Dystopian:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "dystopia"
      letterboxd_list: "theme-dystopian"

  Futuristic:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "future"
      letterboxd_list: "theme-futuristic"

  Pandemic:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "pandemic"
      letterboxd_list: "theme-pandemic"
      rating.gte: 2

  Post-Apocalyptic:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "post-apocalypse"
      letterboxd_list: "theme-post-apocalyptic"

  Robot:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "giant-robot"
      letterboxd_list: "theme-robots"
      rating.gte: 3

  Space:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "outer-space,space-travel"
      letterboxd_list: "theme-outer-space"
      trakt_extra_1: "https://trakt.tv/users/hdlists/lists/outer-space-space-exploration-movies"

  Space Opera:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "space-opera"
      letterboxd_list: "theme-space-opera"
      rating.gte: 2

  Steampunk:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "steampunk"
      letterboxd_list: "theme-steampunk"

  Time Travel:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "time-travel"
      letterboxd_list: "theme-time-travel"
      trakt_extra_1: "https://trakt.tv/users/rizreflects/lists/time-travel"

  Utopia:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "utopia"
      letterboxd_list: "theme-utopian"
      imdb_extra_1: "https://www.imdb.com/list/ls041227401"
