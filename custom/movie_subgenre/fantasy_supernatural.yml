external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Dark Fantasy:
    schedule: &sched weekly(tuesday|wednesday|thursday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(wednesday)
        visible_shared: weekly(wednesday)
      keyword: "dark-fantasy"
      letterboxd_list: "theme-dark-fantasy"

  Dragon:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "dragon"
      letterboxd_list: "theme-dragons"
      rating.gte: 3

  Fairy Tale:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "based-on-fairy-tale"
      letterboxd_list: "theme-fairytale"

  Mythology:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "mythology"
      letterboxd_list: "theme-mythology"

  Supernatural:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "supernatural-power"
      letterboxd_list: "theme-supernatural"

  Urban Fantasy:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "urban-fantasy"
      letterboxd_list: "theme-urban-fantasy"

  Wizardry & Witchcraft:
    schedule: *sched
    template:
      <<: *tmpl
      keyword.any: "witch,wizard"
      letterboxd_list: "theme-wizardry-witchcraft"
