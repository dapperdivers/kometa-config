external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Coming of Age:
    schedule: &sched weekly(thursday|friday|saturday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(friday)
        visible_shared: weekly(friday)
      keyword: "coming-of-age,friendship,teenage-boy,teenage-girl"
      letterboxd_list: "theme-coming-of-age"

  Heartbreak:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "broken-heart"
      letterboxd_list: "theme-heartbreak"
      rating.gte: 1
      votes.gte: 10

  LGBTQ+:
    schedule: *sched
    template:
      <<: *tmpl
      keyword.any: "lgbt,lgbtq,lgbtqi,lgbtqia,gay,lesbianism,homosexuality,gay-interest"
      letterboxd_list: "theme-lgbtq"

  Melodrama:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "melodrama"
      letterboxd_list: "theme-melodrama"

  Romantic Drama:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "romance,drama"
      letterboxd_list: "theme-romantic-drama"
    filters:
      genre: Drama
      year.gte: 1960
