external_templates:
  - file: /config/custom/templates/movie_subgenre_template.yml

# Per-file constants live in the &sched / &tmpl anchors defined on the first
# collection below; every other collection merges them with `<<: *tmpl` and only
# declares what differs (keyword/letterboxd_list, and rating/votes overrides).
collections:
  Chick Flick:
    schedule: &sched weekly(monday|tuesday|wednesday)
    template:
      <<: &tmpl
        name: sub_genre
        rating.gte: 5
        votes.gte: 1000
        visible_home: weekly(tuesday)
        visible_shared: weekly(tuesday)
      keyword: "chick-flick"
      letterboxd_list_details_url_1: "https://letterboxd.com/marialuisacctc/list/women-have-superior-taste-that-is-why-these/by/rating/"
      letterboxd_list_details_limit_1: 250
      letterboxd_list_details_url_2: "https://letterboxd.com/darkestparadise/list/definition-of-girly-classics/by/rating/"
      letterboxd_list_details_limit_2: 250
      letterboxd_list: "theme-chick-flick"
      votes.gte: 100

  Dark Comedy:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "comedy"
      keyword.any: "black-comedy,dark-comedy"
      letterboxd_list: "theme-dark-comedy"

  Mockumentary:
    schedule: *sched
    template:
      <<: *tmpl
      imdb_extra_1: "https://www.imdb.com/list/ls027069047"
      keyword: "mockumentary,fake-documentary"
      letterboxd_list: "theme-mockumentary"
      rating.gte: 2

  Parody:
    schedule: *sched
    template:
      <<: *tmpl
      keyword.any: "parody,parody-comedy"
      letterboxd_list: "theme-parody"

  Romantic Comedy:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "romance,comedy"
      letterboxd_list: "theme-romantic-comedy"
    filters:
      genre: Comedy
      year.gte: 1960

  Satire:
    schedule: *sched
    template:
      <<: *tmpl
      genre: "comedy"
      keyword: "satire"
      letterboxd_list: "theme-satire"

  Stoner Comedy:
    schedule: *sched
    template:
      <<: *tmpl
      keyword: "stoner,marijuana"
      letterboxd_list: "theme-stoner"
      rating.gte: 1
